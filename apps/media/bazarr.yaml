services:
  bazarr:
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:latest
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    configs:
      - source: config_yaml
        target: /config/config/config.yaml
    volumes:
      - ${CONFIGS_DIR}/bazarr:/config
      - ${MOVIES_DIR}:/movies # optional
      - ${SHOWS_DIR}:/shows # optional
    security_opt:
      - no-new-privileges:true
    restart: ${UNIVERSAL_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", http://localhost:6767/api/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Run through VPN
    network_mode: service:gluetun
    depends_on:
      - gluetun

  bazarr-init:
    container_name: bazarr-init
    build:
      dockerfile_inline: |
        FROM alpine:latest
        RUN apk add --no-cache sqlite curl
    restart: on-failure # Retry until services start
    networks:
      - docker
    depends_on:
      bazarr:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    volumes:
      - ${CONFIGS_DIR}/bazarr:/bazarr-config
    entrypoint:
      - sh
      - -c
      - | # shell
        set -e
        NEEDS_RESTART=0

        CHANGES=$$(sqlite3 /bazarr-config/db/bazarr.db "UPDATE table_settings_languages SET enabled=1 WHERE code3='eng' AND enabled != 1; SELECT changes();")
        if [ "$$CHANGES" -gt 0 ]; then
          echo "Enabled English language"
          NEEDS_RESTART=1
        else
          echo "English language already enabled"
        fi

        CHANGES=$$(sqlite3 /bazarr-config/db/bazarr.db "
          INSERT OR IGNORE INTO table_languages_profiles
            (profileId, name, cutoff, originalFormat, items, mustContain, mustNotContain, tag)
          VALUES
            (1, 'English', NULL, 0,
             '[{\"id\": 1, \"language\": \"en\", \"audio_exclude\": \"False\", \"audio_only_include\": \"False\", \"hi\": \"False\", \"forced\": \"False\"}]',
             '[]', '[]', NULL);
          SELECT changes();
        ")
        if [ "$$CHANGES" -gt 0 ]; then
          echo "English language profile created"
          NEEDS_RESTART=1
        else
          echo "English language profile already existed"
        fi

        if [ "$$NEEDS_RESTART" -eq 1 ]; then
          curl -sf -X POST http://socket-proxy:2375/containers/bazarr/restart
          echo "Restarted bazarr"
        else
          echo "No changes made, skipping restart"
        fi

