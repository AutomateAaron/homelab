services:
  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - WEBUI_PORT=8080
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      #- DOCKER_MODS=ghcr.io/gabe565/linuxserver-mod-vuetorrent

    configs:
      - source: qbittorrent_conf
        target: /config/qBittorrent/qBittorrent.conf
      - source: categories_json
        target: /config/qBittorrent/categories.json

    volumes:
      - ${CONFIGS_DIR}/qbittorrent:/config
      - ${DOWNLOADS_DIR}:/downloads

    restart: ${UNIVERSAL_RESTART_POLICY:-unless-stopped}
    network_mode: service:gluetun
    depends_on:
      - gluetun

  forwardarr:
    container_name: forwardarr
    image: ghcr.io/eslutz/forwardarr:latest
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - GLUETUN_PORT_FILE=/tmp/gluetun/forwarded_port
      - TORRENT_CLIENT_URL=http://gluetun:8080
      - TORRENT_CLIENT_USER=admin
      - TORRENT_CLIENT_PASSWORD=${QBITTORRENT_PASSWORD}
      - LOG_LEVEL=info
    volumes:
      - gluetun-data:/tmp/gluetun:ro
    ports:
      - 9090:9090
    restart: ${UNIVERSAL_RESTART_POLICY:-unless-stopped}
    networks:
      - proxy
    depends_on:
      - gluetun
      - qbittorrent

configs:
  qbittorrent_conf:
    content: | # language=xml
      [Application]
      FileLogger\Age=1
      FileLogger\AgeType=1
      FileLogger\Backup=true
      FileLogger\DeleteOld=true
      FileLogger\Enabled=true
      FileLogger\MaxSizeBytes=66560
      FileLogger\Path=/config/qBittorrent/logs

      [AutoRun]
      enabled=false
      program=

      [BitTorrent]
      Session\AddTorrentStopped=false
      Session\DefaultSavePath=/downloads/
      Session\DisableAutoTMMByDefault=false
      Session\DisableAutoTMMTriggers\CategorySavePathChanged=false
      Session\DisableAutoTMMTriggers\DefaultSavePathChanged=false
      Session\ExcludedFileNames=
      Session\Interface=tun0
      Session\InterfaceName=tun0
      Session\Port=6881
      Session\QueueingSystemEnabled=true
      Session\SSL\Port=61415
      Session\ShareLimitAction=Stop
      Session\TempPath=/downloads/incomplete/

      [Core]
      AutoDeleteAddedTorrentFile=Never

      [LegalNotice]
      Accepted=true

      [Meta]
      MigrationVersion=8

      [Network]
      Cookies=@Invalid()
      PortForwardingEnabled=false
      Proxy\HostnameLookupEnabled=false
      Proxy\Profiles\BitTorrent=true
      Proxy\Profiles\Misc=true
      Proxy\Profiles\RSS=true

      [Preferences]
      Connection\PortRangeMin=6881
      Connection\UPnP=false
      Downloads\SavePath=/downloads/
      Downloads\TempPath=/downloads/incomplete/
      General\Locale=en
      MailNotification\req_auth=true
      WebUI\Address=*
      WebUI\Password_PBKDF2="${QBITTORRENT_PASSWORD_HASH}"
      WebUI\ServerDomains=*

      [RSS]
      AutoDownloader\DownloadRepacks=true
      AutoDownloader\SmartEpisodeFilter=s(\\d+)e(\\d+), (\\d+)x(\\d+), "(\\d{4}[.\\-]\\d{1,2}[.\\-]\\d{1,2})", "(\\d{1,2}[.\\-]\\d{1,2}[.\\-]\\d{4})"
  categories_json:
    content: | # language=json
      {
          "radarr": {
              "save_path": "/downloads/radarr"
          },
          "sonarr": {
              "save_path": "/downloads/sonarr"
          }
      }
