services:
  caddy:
    container_name: caddy
    build:
      dockerfile_inline: |
        FROM caddy:2-builder AS builder
        RUN xcaddy build \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/fabriziosalmi/caddy-waf

        FROM caddy:2
        COPY --from=builder /usr/bin/caddy /usr/bin/caddy
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
      - 2019:2019
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      DOCKER_HOST: tcp://socket-proxy:2375

    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile

    volumes:
      - ${CONFIGS_DIR}/caddy/data:/data
      - ${CONFIGS_DIR}/caddy/config:/config

    networks:
      - proxy
      - docker
    security_opt:
      - no-new-privileges:true

    
    restart: ${UNIVERSAL_RESTART_POLICY:-unless-stopped}

    depends_on:
      - socket-proxy

configs:
  caddyfile:
    content: | # yaml
      (authelia) {
              forward_auth http://authelia:9091 {
                      copy_headers Remote-User Remote-Groups Remote-Name Remote-Email
                      uri /api/authz/forward-auth
              }
      }

      (cloudflare_tls) {
              tls {
                      dns cloudflare ${CADDY_CLOUDFLARE_API_TOKEN}
              }
      }

      ${AUTHELIA_SUBDOMAIN:-authelia}.${DOMAIN_NAME} {
              reverse_proxy authelia:9091
              import cloudflare_tls
      }

      ${WHOAMI_SUBDOMAIN:-whoami}.${DOMAIN_NAME} {
              import authelia
              reverse_proxy whoami:80
              import cloudflare_tls
      }

      ${JELLYFIN_SUBDOMAIN:-jellyfin}.${DOMAIN_NAME} {
              import authelia
              reverse_proxy jellyfin:8096
              import cloudflare_tls
      }

      ${QBITTORRENT_SUBDOMAIN:-qbittorrent}.${DOMAIN_NAME} {
              import authelia
              reverse_proxy gluetun:8080
              import cloudflare_tls
      }

      ${PROWLARR_SUBDOMAIN:-prowlarr}.${DOMAIN_NAME} {
              import authelia
              reverse_proxy gluetun:9696
              import cloudflare_tls
      }

      ${RADARR_SUBDOMAIN:-radarr}.${DOMAIN_NAME} {
              import authelia
              reverse_proxy gluetun:7878
              import cloudflare_tls
      }

      ${SONARR_SUBDOMAIN:-sonarr}.${DOMAIN_NAME} {
              import authelia
              reverse_proxy gluetun:8989
              import cloudflare_tls
      }

      ${BAZARR_SUBDOMAIN:-bazarr}.${DOMAIN_NAME} {
              import authelia
              reverse_proxy gluetun:6767
              import cloudflare_tls
      }



