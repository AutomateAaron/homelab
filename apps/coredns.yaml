services:
  coredns:
    container_name: coredns
    image: coredns/coredns:latest
    configs:
      - source: corefile
        target: /Corefile
    security_opt:
      - no-new-privileges:true
    restart: ${UNIVERSAL_RESTART_POLICY:-unless-stopped}
    ports:
      - ${SERVER_IP}:53:53/tcp # To avoid conflicting with dnsmasq
      - ${SERVER_IP}:53:53/udp # To avoid conflicting with dnsmasq
    networks:
      - proxy

configs:
  corefile:
    content: | # yaml
      .:53 {
          # 1. Logging for troubleshooting
          log
          errors

          # 2. Health check endpoint (internal)
          health

          # 3. Local DNS entries (The "Hosts" plugin)
          hosts {
              ${SERVER_IP} ${AUTHELIA_SUBDOMAIN:-authelia}.${DOMAIN_NAME} ${WHOAMI_SUBDOMAIN:-whoami}.${DOMAIN_NAME} ${JELLYFIN_SUBDOMAIN:-jellyfin}.${DOMAIN_NAME} ${QBITTORRENT_SUBDOMAIN:-qbittorrent}.${DOMAIN_NAME} ${PROWLARR_SUBDOMAIN:-prowlarr}.${DOMAIN_NAME} ${RADARR_SUBDOMAIN:-radarr}.${DOMAIN_NAME} ${SONARR_SUBDOMAIN:-sonarr}.${DOMAIN_NAME} ${BAZARR_SUBDOMAIN:-bazarr}.${DOMAIN_NAME}
              fallthrough
          }

          # 4. Global forwarding (Forward everything else to upstream)
          forward . 1.1.1.1 8.8.8.8 8.8.4.4 {
              max_concurrent 1000
          }

          # 5. Cache settings to speed up repeated queries
          cache 30
      }